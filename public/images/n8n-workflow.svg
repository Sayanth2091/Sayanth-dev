<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061225"/>
      <stop offset="1" stop-color="#0d1e39"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#07f0ff"/>
      <stop offset="1" stop-color="#a24cff"/>
    </linearGradient>
    <style>.t{font:12px ui-sans-serif; fill:#cfe9ff}.mut{fill:#9cc}</style>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="url(#bg)"/>
  <!-- nodes -->
  <g>
    <rect x="80" y="80" width="140" height="52" rx="10" fill="#102449" stroke="#1a3e6d"/>
    <text x="96" y="111" class="t">Webhook ➝ Alert</text>
  </g>
  <g>
    <rect x="320" y="80" width="160" height="52" rx="10" fill="#102449" stroke="#1a3e6d"/>
    <text x="340" y="111" class="t">Enrich: VT + Whois</text>
  </g>
  <g>
    <rect x="560" y="80" width="140" height="52" rx="10" fill="#102449" stroke="#1a3e6d"/>
    <text x="578" y="111" class="t">Score Risk</text>
  </g>

  <g>
    <rect x="320" y="200" width="160" height="52" rx="10" fill="#102449" stroke="#1a3e6d"/>
    <text x="350" y="231" class="t">Human Review</text>
  </g>
  <g>
    <rect x="560" y="200" width="140" height="52" rx="10" fill="#102449" stroke="#1a3e6d"/>
    <text x="574" y="231" class="t">Create Ticket</text>
  </g>

  <!-- connectors -->
  <path d="M220 106C250 106 270 106 320 106" stroke="url(#neon)" stroke-width="3" fill="none"/>
  <path d="M480 106C520 106 540 106 560 106" stroke="url(#neon)" stroke-width="3" fill="none"/>
  <path d="M640 132C640 160 400 160 400 200" stroke="#1a3e6d" stroke-width="2" fill="none"/>
  <circle cx="400" cy="200" r="4" fill="#07f0ff"/>
  <path d="M400 252C400 280 630 280 630 252" stroke="#1a3e6d" stroke-width="2" fill="none"/>
  <circle cx="630" cy="252" r="4" fill="#a24cff"/>

  <!-- legend -->
  <rect x="56" y="320" width="260" height="46" rx="10" fill="#0f2144" stroke="#18365e"/>
  <text x="72" y="348" class="t mut">n8n-style workflow: intake ➝ enrich ➝ score ➝ review ➝ ticket</text>
</svg>

